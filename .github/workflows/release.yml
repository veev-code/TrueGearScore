name: Package and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lua syntax check
        run: |
          sudo apt-get install -y lua5.1
          ERRORS=0
          while IFS= read -r -d '' file; do
            if ! luac5.1 -p "$file" 2>/dev/null; then
              echo "SYNTAX ERROR: $file"
              luac5.1 -p "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.lua' -not -path './Libs/*' -print0)
          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "$ERRORS file(s) with syntax errors."
            exit 1
          fi
          echo "All Lua files passed syntax check."

      - name: Validate data files
        run: |
          python3 Tools/validate_data.py --verbose

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trim changelog for release
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/ { count++ } count <= 50 { print } count > 50 { exit }' CHANGELOG.md > CHANGELOG_TRIMMED.md
            mv CHANGELOG_TRIMMED.md CHANGELOG.md
          fi

      - name: Package and Release
        uses: BigWigsMods/packager@v2
        with:
          args: -g 2.5.5
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord Notification
        if: always() && !cancelled()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Extract version from tag (strip 'v' prefix if present for changelog matching)
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"

          # Extract changelog for this version only (between current version header and next version header)
          CHANGELOG=$(awk -v ver="$VERSION_NUM" '
            /^## \[/ {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' CHANGELOG.md | head -30)

          # Escape special characters for JSON
          CHANGELOG_ESCAPED=$(echo "$CHANGELOG" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')

          # Fallback if changelog extraction failed
          if [ -z "$CHANGELOG_ESCAPED" ]; then
            CHANGELOG_ESCAPED="See [GitHub release](https://github.com/veev-code/TrueGearScore/releases/tag/${VERSION}) for details."
          fi

          # Truncate if too long for Discord (4096 char limit for description, minus ~300 for intro/links)
          if [ ${#CHANGELOG_ESCAPED} -gt 3500 ]; then
            CHANGELOG_ESCAPED="${CHANGELOG_ESCAPED:0:3500}..."
          fi

          # Post to Discord (--show-error prints response on failure for debugging)
          curl --silent --show-error --fail-with-body \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"TrueGearScore ${VERSION} Released!\",
                \"description\": \"A new version of TrueGearScore has been submitted for release.\\n\\n**Download**\\n[GitHub](https://github.com/veev-code/TrueGearScore/releases/tag/${VERSION}) (available now)\\n[CurseForge](https://www.curseforge.com/wow/addons/truegearscore) (may take time for approval)\\n\\n**What's New**\\n${CHANGELOG_ESCAPED}\",
                \"color\": 5814783
              }]
            }" \
            "$DISCORD_WEBHOOK"
