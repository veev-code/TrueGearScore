name: Package and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lua syntax check
        run: |
          sudo apt-get install -y lua5.1
          ERRORS=0
          while IFS= read -r -d '' file; do
            if ! luac5.1 -p "$file" 2>/dev/null; then
              echo "SYNTAX ERROR: $file"
              luac5.1 -p "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.lua' -not -path './Libs/*' -print0)
          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "$ERRORS file(s) with syntax errors."
            exit 1
          fi
          echo "All Lua files passed syntax check."

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trim changelog for release
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/ { count++ } count <= 50 { print } count > 50 { exit }' CHANGELOG.md > CHANGELOG_TRIMMED.md
            mv CHANGELOG_TRIMMED.md CHANGELOG.md
          fi

      - name: Package and Release
        uses: BigWigsMods/packager@v2
        with:
          args: -g 2.5.5
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
